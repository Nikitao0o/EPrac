services:
  app:
    build:
      context: ./backend
    container_name: eprac-backend
    env_file:
      - .env
    environment:
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eprac:eprac_password@postgres:5432/eprac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthcheck', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  front:
    build:
      context: ./frontend
    container_name: eprac-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: eprac-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eprac}
      POSTGRES_USER: ${POSTGRES_USER:-eprac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eprac_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eprac} -d ${POSTGRES_DB:-eprac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: eprac-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: eprac-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: eprac-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    container_name: eprac-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  elasticsearch-data:
  redis-data:
  prometheus-data:
  grafana-data:
