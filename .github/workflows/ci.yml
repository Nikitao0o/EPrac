name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Проверка, тесты и сборка бэкенда
    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Проверка стиля
        run: ruff check backend/app backend/tests

      - name: Тесты
        run: pytest --cov=backend/app --cov-report=term-missing --cov-fail-under=50

      - name: Сборка образа бэкенда
        run: docker build -t eprac-backend:ci backend

  frontend:
    name: Сборка фронтенда
    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Сборка образа фронтенда
        run: docker build -t eprac-frontend:ci frontend

  compose:
    name: Проверка конфигурации Compose
    runs-on: ubuntu-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Проверка docker compose
        run: |
          cp .env.example .env
          docker compose --env-file .env.example config --quiet
