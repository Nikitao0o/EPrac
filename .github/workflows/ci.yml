name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend lint, tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check backend/app

      - name: Tests
        run: |
          if find . -path '*/tests/test_*.py' -o -path '*/test_*.py' | grep -q .; then
            pytest
          else
            python -m compileall backend/app
          fi

      - name: Build backend image
        run: docker build -t eprac-backend:ci backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t eprac-frontend:ci frontend

  compose:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: |
          cp .env.example .env
          docker compose --env-file .env.example config --quiet
